services:
  - type: web
    name: adcc-backend
    env: python
    region: oregon
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn backend.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: adcc-postgres
          property: connectionString

databases:
  - name: adcc-postgres
    databaseName: adcc
    user: postgres
    region: oregon
