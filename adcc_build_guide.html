
<style>

<h2 class="sr-only">ADCC step-by-step build guide: 10 phases from database to dashboard</h2>

<div class="wrap">
  <div class="phase-nav" id="nav"></div>
  <div id="phases"></div>
</div>

<script>
const phases = [
  {
    num:"01", label:"Database", title:"SQLAlchemy Models",
    why:"This is the foundation of everything. Every agent, every API, every map pin reads from the database. If the database schema is wrong, every layer above it breaks. Build this first, alone, with nothing else.",
    what:"8 SQLAlchemy model files that match your STATE_CONTRACT.md. One file per table: Disaster, Zone, Hospital, Warehouse, Resource, Route, AgentDecision, TimelineEvent.",
    attach:["CLAUDE_MASTER_PROMPT.md","SOURCE_OF_TRUTH.md","STATE_CONTRACT.md"],
    output:["backend/db/models/disaster.py","backend/db/models/zone.py","backend/db/models/resource.py","backend/db/models/route.py","backend/db/models/agent_decision.py","backend/db/models/timeline_event.py","backend/db/models/__init__.py","backend/db/database.py"],
    prompt:`Read CLAUDE_MASTER_PROMPT.md, SOURCE_OF_TRUTH.md, STATE_CONTRACT.md.

Generate complete SQLAlchemy models for ADCC.

Tables required:
- disasters (disaster_id, disaster_type, region, triggered_at, status)
- zones (zone_id, disaster_id FK, name, lat, lon, severity, population, status, road_accessible, assigned_agent)
- hospitals (hospital_id, name, lat, lon, capacity, available_beds)
- warehouses (warehouse_id, name, lat, lon, food_units, medicine_units, rescue_kits)
- resources (resource_id, type, quantity, warehouse_id FK, allocated_to)
- routes (route_id, disaster_id FK, from_id, to_id, waypoints JSON, distance_km, eta_minutes, blocked, via_drone)
- agent_decisions (id, disaster_id FK, agent, action, target_zone, reasoning, timestamp)
- timeline_events (event_id, disaster_id FK, timestamp, agent, event_type, description, zone_id)

Rules:
- Use exact field names from STATE_CONTRACT.md
- Use SQLAlchemy 2.0 declarative style
- Every model has __tablename__
- Every FK uses proper relationship()
- Generate database.py with engine + SessionLocal + Base

Do NOT generate APIs.
Do NOT generate agents.
Only the database layer.`,
    done:"Run alembic revision --autogenerate → migration file has all 8 tables",
    tip:"After Claude generates models, run: alembic init alembic → then alembic revision --autogenerate -m 'init' → then alembic upgrade head. If you see all 8 tables in psql, Day 1 database task is done."
  },
  {
    num:"02", label:"API Stubs", title:"FastAPI Route Stubs",
    why:"You need API endpoints that return 200 before writing any business logic. This lets the frontend team start connecting immediately without waiting for real data. Stubs return hardcoded mock data — no database calls yet.",
    what:"All 7 endpoints from API_FREEZE.md returning stub responses. Every field name exactly as defined. No logic, no database queries — just return the shape so the frontend can verify the contract.",
    attach:["CLAUDE_MASTER_PROMPT.md","SOURCE_OF_TRUTH.md","API_FREEZE.md"],
    output:["backend/api/routes/disaster.py","backend/api/routes/zones.py","backend/api/routes/agents.py","backend/api/routes/routes.py","backend/api/routes/resources.py","backend/api/routes/metrics.py","backend/api/routes/timeline.py","backend/main.py"],
    prompt:`Read CLAUDE_MASTER_PROMPT.md, SOURCE_OF_TRUTH.md, API_FREEZE.md.

Generate FastAPI route stubs for all endpoints in API_FREEZE.md.

Endpoints:
- POST /api/disaster/create
- GET /api/disaster/{disaster_id}
- GET /api/zones
- GET /api/agents/decisions
- POST /api/route/optimize
- POST /api/resource/allocate
- GET /api/metrics/{disaster_id}
- GET /api/timeline/{disaster_id}

Rules:
- Return exact response shapes from API_FREEZE.md
- Use stub/hardcoded data only
- No database calls yet
- No business logic yet
- Every endpoint returns 200 with correct field names
- Add CORS middleware for localhost:3000

Generate main.py that includes all routers.`,
    done:"curl localhost:8000/api/zones returns JSON with a 'zones' array — field names match API_FREEZE.md exactly",
    tip:"Test every endpoint with curl or Postman before moving on. If any field name is wrong here, the frontend will break later. Fix it now while there's no real logic attached."
  },
  {
    num:"03", label:"Seed Loader", title:"Simulation Engine",
    why:"Your agents and map need data to work with. The seed file (operation_brahmaputra.json) contains 50 zones, 10 hospitals, 5 warehouses, 10 drones, and 15 vehicles. The simulation engine loads this into PostgreSQL so the real APIs can query it.",
    what:"simulation_engine.py reads operation_brahmaputra.json and inserts all records into the database. Also a /api/disaster/create endpoint that triggers the seed load.",
    attach:["STATE_CONTRACT.md","operation_brahmaputra.json"],
    output:["backend/services/simulation_engine.py","seed_data/operation_brahmaputra.json"],
    prompt:`Read STATE_CONTRACT.md and operation_brahmaputra.json.

Generate simulation_engine.py that:
1. Reads operation_brahmaputra.json
2. Creates a new Disaster record in the database
3. Inserts all 50 zones into the zones table
4. Inserts all 10 hospitals into the hospitals table
5. Inserts all 5 warehouses into the warehouses table
6. Returns the disaster_id

Function signature:
async def load_scenario(scenario_name: str, db: Session) -> str

Also update POST /api/disaster/create to call load_scenario()
instead of returning a stub.

Do not create agents.
Do not add LangGraph.
Only data loading.`,
    done:"POST /api/disaster/create → psql query SELECT COUNT(*) FROM zones returns 50",
    tip:"After running the seed, open psql and run: SELECT zone_id, name, severity, road_accessible FROM zones ORDER BY severity DESC LIMIT 10. You should see Majuli Island and Tinsukia at the top with severity 10."
  },
  {
    num:"04", label:"Map", title:"Leaflet Map Component",
    why:"The map is your most important visual. Judges see this first. It needs to show zones as colored circles (red = critical, orange = moderate, yellow = stable), hospitals as pins, and blocked roads. Build it now so the team can see something real.",
    what:"A Next.js page with react-leaflet that fetches /api/zones and /api/disaster and renders colored zone circles on a real map of Assam, India. No agents yet — just the data layer visualized.",
    attach:["UI_LAYOUT.md","API_FREEZE.md"],
    output:["frontend/components/Map/Map.jsx","frontend/components/Map/ZoneCircle.jsx","frontend/components/Map/HospitalPin.jsx","frontend/app/dashboard/page.jsx"],
    prompt:`Read UI_LAYOUT.md and API_FREEZE.md.

Generate a Leaflet map component for ADCC.

Requirements:
- Use react-leaflet
- Center map on Assam, India (lat: 26.5, lon: 93.0, zoom: 7)
- Fetch GET /api/zones on mount
- Render each zone as a circle:
  - severity 8-10 → red (#E8410A), radius 18
  - severity 5-7 → orange (#BA7517), radius 14
  - severity 1-4 → yellow (#F4D35A), radius 10
- Circle popup shows: zone_id, name, severity, population, road_accessible
- road_accessible: false → add dashed red border to circle
- Fetch hospitals separately, render as blue pin markers
- Loading state while fetching

Do NOT add agents.
Do NOT add Socket.IO yet.
Only static data rendering.`,
    done:"Dashboard loads, map shows 50 colored circles on Assam map, red circles around Majuli Island and Tinsukia",
    tip:"If you see a grey box instead of a map, you're missing the Leaflet CSS import. Add: import 'leaflet/dist/leaflet.css' to your layout.js or Map.jsx. Also fix the default marker icon bug: import L from 'leaflet'; delete L.Icon.Default.prototype._getIconUrl;"
  },
  {
    num:"05", label:"Severity Engine", title:"Deterministic Severity Scoring",
    why:"This is the brain before the AI brain. Every agent decision starts here. The severity engine takes zone data and computes a 1–10 score using a deterministic formula. No LLM needed — pure math. Optimization-first approach.",
    what:"severity_engine.py that takes a list of zones and returns them sorted by severity score. Formula uses population, road accessibility, and disaster type multipliers. Outputs into ADCCState.priority_queue.",
    attach:["STATE_CONTRACT.md","SOURCE_OF_TRUTH.md"],
    output:["backend/services/severity_engine.py"],
    prompt:`Read STATE_CONTRACT.md and SOURCE_OF_TRUTH.md.

Generate severity_engine.py with this exact formula:

base_score = (zone.population / 1000) * 1.5
road_multiplier = 3.0 if not zone.road_accessible else 1.0
disaster_multiplier = 1.5 if disaster_type == "flood" else 1.2

raw_score = base_score * road_multiplier * disaster_multiplier
severity = min(10, round(raw_score))

Function signatures:
def compute_severity(zone: dict, disaster_type: str) -> int
def rank_zones(zones: list, disaster_type: str) -> list[str]  # returns zone_ids sorted desc

rank_zones() returns a list of zone_ids in priority order.
This becomes ADCCState.priority_queue.

No LangGraph.
No LLM.
Pure Python math only.
Include unit tests for TC1: Majuli Island (pop 8000, road blocked, flood) → severity 10`,
    done:"python -m pytest backend/services/test_severity.py → all tests pass, Majuli Island scores 10",
    tip:"Run compute_severity on all 50 zones and print the top 10. Compare with the seed data — zones with road_accessible: false and high population should score highest. If the ranking looks wrong, check your formula multipliers."
  },
  {
    num:"06", label:"OR-Tools", title:"Route Optimization Engine",
    why:"This is the most technically impressive part of ADCC. OR-Tools solves the Vehicle Routing Problem — given multiple warehouses, vehicles, and destination zones, it finds the optimal delivery routes. This is what makes ADCC different from a dashboard.",
    what:"route_optimizer.py using Google OR-Tools VRP solver. Takes warehouses, vehicles, and priority zones. Returns optimal routes as a list of waypoints. Called by POST /api/route/optimize.",
    attach:["SOURCE_OF_TRUTH.md","STATE_CONTRACT.md"],
    output:["backend/services/route_optimizer.py"],
    prompt:`Read SOURCE_OF_TRUTH.md and STATE_CONTRACT.md.

Generate route_optimizer.py using Google OR-Tools.

Problem: Vehicle Routing Problem (VRP)
- Depots: warehouses (WH-001 to WH-005)
- Vehicles: ground vehicles from vehicles list
- Destinations: priority zones (road_accessible: true only)
- Blocked zones (road_accessible: false) get drone_flag: true, skip VRP

Function signatures:
def optimize_routes(
    warehouses: list,
    vehicles: list,
    priority_zones: list,
    blocked_zone_ids: list
) -> list[dict]

Returns list of Route objects matching STATE_CONTRACT.md RouteState format.

Use ortools.constraint_solver.routing_enums_pb2 and routing_parameters.
Distance matrix = Haversine formula between lat/lon points.

Do NOT use any LLM.
Do NOT use LangGraph.
Only OR-Tools VRP.`,
    done:"POST /api/route/optimize returns routes with waypoints, distance_km, eta_minutes populated. No crashes.",
    tip:"OR-Tools VRP can fail silently if the distance matrix has zeros on the diagonal or NaN values. Always print the solution status — if status is 0 (ROUTING_NOT_SOLVED), your distance matrix has an issue. Add: print('Solver status:', assignment) before returning."
  },
  {
    num:"07", label:"Allocation", title:"Resource Allocation Engine",
    why:"Once routes are optimized, resources need to be assigned. The allocation engine uses priority queue order to distribute food, medicine, and rescue equipment from warehouses to zones. Pure deterministic rules — no AI needed here either.",
    what:"allocation_engine.py that takes the priority_queue (from severity engine) and warehouse inventory and returns allocation decisions. Updates resource.allocated_to in the database.",
    attach:["STATE_CONTRACT.md"],
    output:["backend/services/allocation_engine.py"],
    prompt:`Read STATE_CONTRACT.md.

Generate allocation_engine.py for ADCC resource allocation.

Rules:
1. Process zones in priority_queue order (highest severity first)
2. Each critical zone (severity 8-10) gets: 1000 food units, 500 medicine, 50 rescue kits
3. Each moderate zone (severity 5-7) gets: 500 food units, 200 medicine, 20 rescue kits
4. Each stable zone (severity 1-4) gets: 200 food units, 100 medicine, 5 rescue kits
5. Allocate from nearest warehouse (Haversine distance)
6. If warehouse runs out, split allocation across multiple warehouses
7. Track remaining inventory

Function signature:
def allocate_resources(
    priority_queue: list[str],
    zones: list[dict],
    warehouses: list[dict]
) -> list[dict]  # returns ResourceState list

No LLM.
No LangGraph.
Pure deterministic rules.`,
    done:"allocate_resources() returns allocations for all 50 zones, no warehouse goes below 0 inventory",
    tip:"After allocation, sum up total food allocated vs total food available across all warehouses. The 91% supplies_delivered metric means you should be allocating most of your inventory. If you're allocating less than 80%, your rules may be too conservative."
  },
  {
    num:"08", label:"LangGraph", title:"5 AI Agent Nodes",
    why:"NOW — and only now — you add LangGraph. The severity engine, OR-Tools, and allocation engine already do the hard work. LangGraph's job is to orchestrate them, make decisions, and generate reasoning text for the Agent Activity Panel.",
    what:"5 agent files + graph.py. Each agent calls the services you already built, adds reasoning text, and emits Socket.IO events. The graph wires them in sequence: coordinator → route → resource → medical → drone.",
    attach:["CLAUDE_MASTER_PROMPT.md","SOURCE_OF_TRUTH.md","STATE_CONTRACT.md"],
    output:["backend/agents/coordinator_agent.py","backend/agents/route_agent.py","backend/agents/resource_agent.py","backend/agents/medical_agent.py","backend/agents/drone_agent.py","backend/agents/graph.py","backend/agents/state.py"],
    prompt:`Read CLAUDE_MASTER_PROMPT.md, SOURCE_OF_TRUTH.md, STATE_CONTRACT.md.

Generate 5 LangGraph agent nodes for ADCC.

State: Use ADCCState from STATE_CONTRACT.md exactly. Import from state.py.

Node order: severity_node → route_node → resource_node → medical_node → drone_node → coordinator_node

Each node must:
1. Call the corresponding service (severity_engine, route_optimizer, etc.)
2. Add an AgentDecision to state.agent_decisions with reasoning text
3. Add a TimelineEvent to state.timeline_events
4. Return updated ADCCState

Coordinator node runs LAST — it reads all other agents' decisions and creates final_plan.

Drone node handles zones where road_accessible: false — marks route.via_drone: true.

Medical node assigns hospitals to critical zones based on distance and available_beds.

Generate graph.py with:
from langgraph.graph import StateGraph, END
graph = StateGraph(ADCCState)
(wire all 5 nodes in sequence)
app = graph.compile()

No CrewAI.
No hallucinated agents.
Exactly 5 nodes.`,
    done:"app.invoke(initial_state) runs without errors, state.timeline_events has at least 5 events, state.agent_decisions has at least 5 decisions",
    tip:"Test each agent node in isolation before connecting them in the graph. Call severity_node(test_state) directly. If it works standalone, add it to the graph. This saves hours of debugging a full graph run."
  },
  {
    num:"09", label:"Socket.IO", title:"Real-Time Event Streaming",
    why:"Socket.IO is what makes ADCC feel live. Every agent decision, every timeline event, every metrics update streams to the frontend in real time. This is the WOW factor judges see during the demo.",
    what:"socket_manager.py that emits events as the LangGraph graph runs. Frontend listens and updates the Agent Panel, Timeline, and KPI cards live as agents make decisions.",
    attach:["STATE_CONTRACT.md"],
    output:["backend/services/socket_manager.py","frontend/hooks/useDisasterData.js","frontend/components/AgentPanel/AgentPanel.jsx","frontend/components/Timeline/Timeline.jsx"],
    prompt:`Read STATE_CONTRACT.md.

Generate socket_manager.py for ADCC.

Events to emit (match STATE_CONTRACT.md Socket.IO Events exactly):
- "agent_update": { agent, action, reasoning }
- "timeline_event": TimelineEvent object
- "state_update": full ADCCState snapshot
- "metrics_update": { response_time_reduction, delivery_efficiency, supplies_delivered, lives_impacted }

socket_manager.py must:
1. Initialize python-socketio AsyncServer
2. Provide emit_agent_update(agent, action, reasoning) helper
3. Provide emit_timeline_event(event: TimelineEvent) helper
4. Mount socketio app on FastAPI with socketio.ASGIApp

Also generate:
- frontend/hooks/useDisasterData.js: connect to Socket.IO, listen to all 4 events, return state
- frontend/components/AgentPanel/AgentPanel.jsx: 5 rows, one per agent, shows last action + reasoning
- frontend/components/Timeline/Timeline.jsx: vertical list, newest first, color-coded by agent`,
    done:"Trigger disaster → Agent Panel shows 5 agents updating live → Timeline fills with events → KPI numbers animate",
    tip:"Test Socket.IO connection before the demo. Open browser console: you should see 'connected' logged. If you see 'CORS error', add your frontend URL to the socketio allowed_origins. If you see 'transport error', make sure you're using the ASGI mount pattern, not running two separate servers."
  },
  {
    num:"10", label:"Dashboard", title:"KPI Cards + Full Dashboard",
    why:"The last piece. Connect everything: KPI cards that animate from 0 to target, the Trigger Disaster button that starts the full pipeline, and the header with the scenario name. This is what judges see for the first 30 seconds.",
    what:"Complete dashboard page per UI_LAYOUT.md. KPI cards with animated counters. Header with trigger button. Socket.IO already connected from Phase 9. No new API changes.",
    attach:["UI_LAYOUT.md","API_FREEZE.md"],
    output:["frontend/components/KPICards/KPICards.jsx","frontend/components/Header/Header.jsx","frontend/app/dashboard/page.jsx"],
    prompt:`Read UI_LAYOUT.md and API_FREEZE.md.

Generate the complete ADCC dashboard page.

Layout (per UI_LAYOUT.md):
1. Header: "ADCC" logo + live badge + "Operation Brahmaputra · Assam · Flood" + [Trigger Disaster] button
2. KPI row: 4 cards — Response Time (42%), Delivery Efficiency (67%), Supplies Delivered (91%), Lives Impacted (3200)
3. Map (full width, already built in Phase 4)
4. Bottom row: Timeline (left) + Agent Panel (right)

KPI cards:
- Start at 0 when page loads
- Animate to target values when disaster is triggered (counter animation, 2 seconds)
- Values come from Socket.IO "metrics_update" event

[Trigger Disaster] button:
- Calls POST /api/disaster/create
- Color: #E8410A
- Changes to "Running..." with spinner while agents process

No new API endpoints.
No architecture changes.
UI layer only.`,
    done:"Full demo flow: click Trigger Disaster → map circles light up red → agents update live → KPI cards count up to 42/67/91/3200",
    tip:"This is your judge demo sequence. Rehearse it 3 times before presenting. The 10-step narrative: flood hits → roads block → agents activate → routes recalculate → resources redistribute → drones deploy → medical teams assigned → KPIs update → 3200 lives impacted. Say this out loud while the dashboard runs."
  }
];

const colors = {
  attach:"#378ADD", output:"#1D9E75"
};

function buildNav(){
  const nav = document.getElementById('nav');
  phases.forEach((p,i)=>{
    const b = document.createElement('button');
    b.className='pnav'+(i===0?' on':'');
    b.textContent=`${p.num} ${p.label}`;
    b.onclick=()=>{
      document.querySelectorAll('.pnav').forEach(x=>x.classList.remove('on'));
      document.querySelectorAll('.phase').forEach(x=>x.classList.remove('on'));
      b.classList.add('on');
      document.getElementById('ph'+i).classList.add('on');
    };
    nav.appendChild(b);
  });
}

function buildPhases(){
  const container = document.getElementById('phases');
  phases.forEach((p,i)=>{
    const div = document.createElement('div');
    div.className='phase'+(i===0?' on':'');
    div.id='ph'+i;

    const attachPills = p.attach.map(f=>`<div class="file-pill attach"><i class="ti ti-paperclip" style="font-size:12px;margin-right:4px" aria-hidden="true"></i>${f}</div>`).join('');
    const outputPills = p.output.map(f=>`<div class="file-pill output"><i class="ti ti-file-code" style="font-size:12px;margin-right:4px" aria-hidden="true"></i>${f}</div>`).join('');

    div.innerHTML=`
      <div class="phase-header">
        <div class="phase-num">${p.num}</div>
        <div class="phase-meta">
          <h3>${p.title}</h3>
          <p>Phase ${i+1} of ${phases.length}</p>
        </div>
      </div>

      <div class="section-label">Why this phase exists</div>
      <div class="explain">${p.why}</div>

      <div class="section-label">What Claude will generate</div>
      <div class="what-box">
        <div class="what-text">${p.what}</div>
      </div>

      <div class="section-label">Attach these files to Claude</div>
      <div class="files-grid">${attachPills}</div>

      <div class="section-label">Output files</div>
      <div class="files-grid">${outputPills}</div>

      <div class="section-label">Exact prompt to send Claude</div>
      <div class="prompt-box">
        <pre>${p.prompt}</pre>
        <button class="copy-btn" onclick="copyPrompt(${i})">Copy</button>
      </div>

      <div class="section-label">Done when</div>
      <div class="card">
        <div class="rule-row">
          <i class="ti ti-circle-check" aria-hidden="true"></i>
          <span>${p.done}</span>
        </div>
      </div>

      <div class="section-label">Before moving to next phase</div>
      <div class="tip-box">${p.tip}</div>
    `;
    container.appendChild(div);
  });
}

function copyPrompt(i){
  navigator.clipboard.writeText(phases[i].prompt).then(()=>{
    const btn = document.querySelectorAll('.copy-btn')[i];
    const orig = btn.textContent;
    btn.textContent='Copied!';
    setTimeout(()=>btn.textContent=orig, 1500);
  });
}

buildNav();
buildPhases();
</script>
